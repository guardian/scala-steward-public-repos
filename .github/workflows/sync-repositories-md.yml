name: Sync REPOSITORIES.md

on:
  push:
  schedule:
    - cron: "0 9 * * MON-FRI"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 214238
          private-key: ${{ secrets.SCALA_STEWARD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Regenerate REPOSITORIES.md from app installations
        id: generate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --paginate /installation/repositories \
            --jq '.repositories[].full_name' | sort \
            | grep -vxFf <(sed -n 's/^- //p' ./*-repositories.md 2>/dev/null) \
            | sed 's/^/- /' > REPOSITORIES.md

          if git diff --quiet REPOSITORIES.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.generate.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          branch="sync-repositories-md"
      
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add REPOSITORIES.md
          git commit -m "Sync REPOSITORIES.md with app installations"
          git push --force origin "$branch"
      
          # Create PR only if one doesn't already exist for this branch
          if ! gh pr list --head "$branch" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "Sync REPOSITORIES.md with app installations" \
              --body "Updates REPOSITORIES.md to match the repos that have the GitHub App installed."
          fi
